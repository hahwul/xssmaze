# XSSMaze lint configuration.
#
# A few defaults are relaxed because the codebase is unusually heavy in
# inline HTML literals (each maze is, by design, a tiny vulnerable HTML
# page). The disabled rules below would fight that style without
# improving real code quality.

# Disabled: every maze handler returns an inline multi-line HTML string.
# Forcing hundreds of heredoc conversions adds zero functional value and
# a lot of whitespace noise.
Style/MultilineStringLiteral:
  Enabled: false

# Disabled: assets.cr (CSS/JS) and banner.cr (ASCII art) read better with
# their existing indentation than with the 2-space heredoc rule.
Style/HeredocIndent:
  Enabled: false

# Maze definitions lean on short, contextually-clear block parameter
# names (m for maze, p for param, ch for char, etc.). Lower the minimum
# length and explicitly allow the names we lean on.
Naming/BlockParameterName:
  MinNameLength: 2
  AllowedNames:
    - a
    - b
    - c
    - e
    - h
    - i
    - j
    - k
    - m
    - n
    - p
    - q
    - r
    - t
    - v
    - x
    - y
    - ch
    - el
    - gz
    - id
    - io
    - ip
    - ln
    - op
    - tx
    - wg
    - ws
